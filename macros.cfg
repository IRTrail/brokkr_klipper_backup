#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=G32
    BED_MESH_CLEAR
    # This is a lazy home, and doesn't home if already homed.
    {% if printer.toolhead.homed_axes != "xyz" %}
    M117 Homing
    G28
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=0
    {% endif %}
    M117 Leveling Gantry
    QUAD_GANTRY_LEVEL
    M117 Re-Homing
    G28
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=0
    RESTORE_GCODE_STATE NAME=G32

[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    {% set BED_TEMP = params.BED_TEMP|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|float %}
    M140 S{BED_TEMP}                 ; set temperature
    G32                              ; home all axes
    G21                              ; set units to millimeters
    G90                              ; use absolute coordinates
    M83                              ; use relative distances for extrusion
    G1 Z20 F3000                     ; move nozzle away from bed
    M109 S{EXTRUDER_TEMP}            ; hold temperature
    M190 S{BED_TEMP}                 ; hold temperature
    #BED_MESH_PROFILE LOAD=default    ; load bed mesh
    NOZZLE_PRIME                     ; call nozzle prime routine
    M117 Printing...
    UPDATE_DELAYED_GCODE ID=clear_display DURATION=60

[gcode_macro NOZZLE_PRIME]
# primes the nozzle.
gcode:
    M117 Priming Nozzle
    G92 E0                          ; Reset Extruder
    G0 X1.5 Y50 Z10 F30000
    G1 X1.5 Y50 Z2.0 F4000          ; move z up little to prevent scratching of surface
    G1 X1.5 Y50 Z0.3 F10000         ; move to start-line position
    G1 X1.5 Y300.0 Z0.3 F4000 E12.47 ; draw 1st line
    G1 X1.9 Y300.0 Z0.3 F4000       ; move to side a little
    G1 X1.9 Y50 Z0.3 F4000 E12.47   ; draw 2nd line
    G1 E-0.3 F3600                  ; retract filament
    G92 E0                          ; reset extruder
    G1 Z2.0 F3000                   ; move z up little to prevent scratching of surface
    G1 X5 Y50 Z2.0 F10000           ; Move over to prevent blob squish
    M117 Nozzle Prime Complete

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F3600                ; retract filament
    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0  X175 Y325 F3600            ; park nozzle at rear
    BED_MESH_CLEAR
    M117 Print Complete!

[delayed_gcode clear_display]
gcode:
    M117

[gcode_macro AUTO_BED_MESH]
gcode:
    G32
    BED_MESH_CALIBRATE
    BED_MESH_PROFILE SAVE=default
    BED_MESH_OUTPUT PGP=1
    SAVE_CONFIG